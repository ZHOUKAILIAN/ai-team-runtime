name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m unittest discover -s tests
      - run: python scripts/release/verify_release_version.py --tag "${GITHUB_REF_NAME}"
      - run: python -m build
      - run: python scripts/release/extract_release_changelog.py --version "${GITHUB_REF_NAME#v}" --changelog CHANGELOG.md > dist/CHANGELOG.md
      - run: |
          WHEEL_PATH=$(find dist -maxdepth 1 -name '*.whl' | head -n 1)
          python scripts/release/render_install_script.py \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${GITHUB_REF_NAME}" \
            --version "${GITHUB_REF_NAME#v}" \
            --wheel "$(basename "${WHEEL_PATH}")" > dist/install.sh
          chmod +x dist/install.sh
      - run: |
          cd dist
          shasum -a 256 *.whl *.tar.gz install.sh CHANGELOG.md > SHA256SUMS
      - run: |
          test -f dist/CHANGELOG.md
          test -f dist/install.sh
          test -f dist/SHA256SUMS
          ls dist/*.whl dist/*.tar.gz
      - run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.whl \
            dist/*.tar.gz \
            dist/install.sh \
            dist/SHA256SUMS \
            dist/CHANGELOG.md \
            --title "${GITHUB_REF_NAME}" \
            --notes-file dist/CHANGELOG.md \
            --draft
      - run: gh release edit "${GITHUB_REF_NAME}" --draft=false
